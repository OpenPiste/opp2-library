; OpenPiste Protocol Level 2 — reference implementation
; PlatformIO project configuration
;
; Environments:
;   native     — builds and runs unit tests on Linux/macOS/Windows
;                using the host compiler. No hardware required.
;                Run with: pio test -e native
;
;   esp32      — builds the library for ESP32 (Arduino framework).
;                Build with: pio run -e esp32
;                Test with:  pio test -e esp32
;
;   esp32_idf  — ESP32 with ESP-IDF framework (advanced users).
;
; Usage:
;   pio test -e native              run all tests on desktop
;   pio test -e native -f test_topic  run only one test suite
;   pio run -e esp32                build for ESP32 (no flash)
;   pio run -e esp32 -t upload      build and flash to ESP32

[platformio]
default_envs = native

; ── Native (Linux / macOS / Windows desktop) ─────────────────────────────────

[env:native]
platform       = native
test_framework = doctest
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
build_flags =
    -std=c++11
    -Wall
    -Wextra
    -DOPP2_PLATFORM_NATIVE=1

; ── ESP32 (Arduino framework) ────────────────────────────────────────────────

[env:esp32]
platform    = espressif32
board       = esp32dev
framework   = arduino
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
build_flags =
    -std=c++11
    -Wall
    -Wextra
    -DOPP2_PLATFORM_ESP32=1
    ; Uncomment if using PubSubClient and need larger MQTT packets:
    ; -DMQTT_MAX_PACKET_SIZE=1024

; ── ESP32 (ESP-IDF framework) ────────────────────────────────────────────────

[env:esp32_idf]
platform    = espressif32
board       = esp32dev
framework   = espidf
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
build_flags =
    -std=c++11
    -Wall
    -Wextra
    -DOPP2_PLATFORM_ESP32_IDF=1
