; PlatformIO configuration for OPP2 examples
; Copy this file to the example directory and run:
;   pio run -t upload    to build and flash
;   pio device monitor   to open the serial monitor

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.0.0
    https://github.com/OpenPiste/opp2-library

build_flags =
    -std=c++11
    -DMQTT_MAX_PACKET_SIZE=512

monitor_speed = 115200
